<svg width="432" height="432" viewBox="0 0 432 432" xmlns="http://www.w3.org/2000/svg">
  <!--
    Adaptive-icon FOREGROUND layer.

    Android adaptive icons crop the outer ~33% of the canvas depending on
    the launcher mask (circle / squircle / teardrop / pure square). The
    safe zone is the inner 72×72 region of a 108-unit canvas (~67%).

    Our drawing canvas here is 432×432 because that's what Android Studio
    exports for xxxhdpi adaptive layers. The visible inner 'safe' area
    is ~288×288, centred. We position the drop inside that.

    The background layer is a solid colour (#FF5A6B coral — the gradient
    midpoint) so masking always shows a continuous colour. The drop sits
    on top in pure white with the same negative-space play button as the
    full logo, but the cutout uses solid coral instead of the diagonal
    gradient (because the bg layer is flat).
  -->
  <defs>
    <radialGradient id="dropSheen" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="70%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFEAF0"/>
    </radialGradient>
  </defs>

  <!-- Teardrop, scaled to live inside the 288×288 safe zone.
       Safe zone runs x:[72,360], y:[72,360]. Drop fills it. -->
  <path
    fill="url(#dropSheen)"
    d="M 216 84
       C 216 84 124 196 124 264
       C 124 322 162 372 216 372
       C 270 372 308 322 308 264
       C 308 196 216 84 216 84 Z"/>

  <!-- Negative-space play circle, filled with the bg colour (coral) -->
  <circle cx="216" cy="252" r="58" fill="#FF5A6B"/>

  <!-- White play triangle -->
  <path
    fill="#FFFFFF"
    d="M 200 220
       L 250 250
       C 257 254 257 261 250 265
       L 200 295
       C 193 299 184 295 184 287
       L 184 228
       C 184 220 193 216 200 220 Z"/>
</svg>
