name: Build & Deploy BeatDrop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Persistent debug keystore ───────────────────────────────────────────
      # Uses a CONSISTENT keystore for every build so APK upgrades work.
      # The keystore is decoded from a base64 string embedded here.
      # This is a DEBUG keystore — not a security risk.
      - name: Setup debug keystore
        run: |
          mkdir -p "$HOME/.android"
          echo "" \
            | base64 --decode > "$HOME/.android/debug.keystore" 2>/dev/null || true
          # If the embedded keystore fails to decode (truncated), generate a fresh one
          if [ ! -s "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair -v \
              -keystore "$HOME/.android/debug.keystore" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass android -keypass android \
              -dname "CN=BeatDrop,O=BeatDrop,C=US" 2>&1 | tail -1
          fi
          ls -la "$HOME/.android/debug.keystore"

      # ── Build debug APK ─────────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Build signed release APK if keystore secrets are present ─────────────
      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK (signed)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── Collect APKs ────────────────────────────────────────────────────────
      - name: Gather APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/ 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatDrop-apk
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BeatDrop v1.1.0 build ${{ github.run_number }}
          body: |
            BeatDrop Premium v1.1.0 — build ${{ github.run_number }}
            Commit: ${{ github.sha }}

            **Install:** Download `app-debug.apk`, enable "Install unknown apps" in Settings, and install.
            If upgrading, uninstall the previous version first (one-time, due to signing key change).
          files: dist/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
