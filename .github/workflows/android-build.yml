name: Build & Deploy BeatDrop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a GitHub Release

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Build debug APK (always; no secrets needed) ─────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Build signed release APK if keystore secrets are present ─────────────
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK (signed)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      # ── Collect APKs into one folder ────────────────────────────────────────
      - name: Gather APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/ 2>/dev/null || true
          cp app/build/outputs/apk/release/*.apk dist/ 2>/dev/null || true
          ls -la dist

      # ── Upload as workflow artifact (download from the run page) ─────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatDrop-apk
          path: dist/*.apk
          if-no-files-found: error

      # ── Deploy: publish APKs to a GitHub Release ────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: BeatDrop build ${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}.
            Install the APK on Android (allow "install from unknown sources").
          files: dist/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
